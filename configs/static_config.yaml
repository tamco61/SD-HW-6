components_manager:
  task_processors: # Task processor is an executor for coroutine tasks
    main-task-processor: # Make a task processor for CPU-bound couroutine tasks.
      worker_threads: $worker-threads # Process tasks in 4 threads.

    fs-task-processor: # Make a separate task processor for filesystem bound tasks.
      worker_threads: $worker-fs-threads

  default_task_processor: main-task-processor

  components: # Configuring components that were registered via component_list
    server:
      listener: # configuring the main listening socket...
        address: 0.0.0.0
        port: $server-port # ...to listen on this port and...
        task_processor: main-task-processor # ...process incoming requests on this task processor.
    logging:
      fs-task-processor: fs-task-processor
      loggers:
        default:
          file_path: "@stderr"
          level: $logger-level
          overflow_behavior: discard # Drop logs if the system is too busy to write them down.

    # Dynamic config options. Cache is disabled, updates are disabled.
    dynamic-config:
      # For most of userver dynamic configs, defaults are used, some are overridden here.
      # See userver "dynamic config" docs for what configs exist.
      defaults:
        HTTP_CLIENT_CONNECTION_POOL_SIZE: 1000
        POSTGRES_DEFAULT_COMMAND_CONTROL:
          network_timeout_ms: 750
          statement_timeout_ms: 500

    auth-middleware-factory: {}

    default-server-middleware-pipeline-builder:
      append:
        - auth-middleware-factory

    # --- Secdist (хранит credentials для Redis) ---
    secdist:
      provider: default-secdist-provider

    default-secdist-provider:
      config: $secdist-path
      missing-ok: true
      environment-secrets-key: ""

    postgres-db:
      dns_resolver: async
      connlimit_mode: manual
      dbconnection: $dbconnection
      blocking_task_processor: fs-task-processor

    postgres-storage:

    mongo-blabla:
      dbconnection: $mongo-connection
      maintenance_period: 15s

    mongo-storage:

    # --- RabbitMQ (event broker для ДЗ-06) ---
    rabbitmq-blabla:
      secdist_alias: rabbitmq-blabla
      min_pool_size: 2
      max_pool_size: 5
      max_in_flight_requests: 10
      use_secure_connection: false

    event-publisher:

    event-consumer:
      rabbit_name: rabbitmq-blabla
      queue: blablacar.audit.events
      prefetch_count: 5

    # --- Redis (кеширование и rate limiting) ---
    redis-blabla:
      groups:
        - config_name: redis-blabla
          db: redis-blabla
          sharding_strategy: RedisStandalone
      thread_pools:
        redis_thread_pool_size: 4
        sentinel_thread_pool_size: 1
      subscribe_groups:

    # --- Компонент кеширования через Redis ---
    redis-cache:

    # --- Компонент rate limiting через Redis ---
    rate-limiter:

    handler-login-user:
      path: /v1/login
      method: POST
      task_processor: main-task-processor

    handler-create-user:
      path: /v1/users
      method: POST
      task_processor: main-task-processor

    handler-get-user:
      path: /v1/users
      method: GET
      task_processor: main-task-processor

    handler-search-users:
      path: /v1/users/search
      method: GET
      task_processor: main-task-processor

    handler-create-route:
      path: /v1/routes
      method: POST
      task_processor: main-task-processor
      middlewares:
        auth-middleware-factory: {}

    handler-get-routes:
      path: /v1/routes
      method: GET
      task_processor: main-task-processor

    handler-create-trip:
      path: /v1/trips
      method: POST
      task_processor: main-task-processor
      middlewares:
        auth-middleware-factory: {}

    handler-add-user-to-trip:
      path: /v1/trips/add-user
      method: POST
      task_processor: main-task-processor

    handler-get-trip:
      path: /v1/trips
      method: GET
      task_processor: main-task-processor

    testsuite-support: {}

    http-client-middleware-pipeline:
      load-enabled: $is-testing

    http-client-core:
      load-enabled: $is-testing

    http-client:
      load-enabled: $is-testing

    tests-control:
      load-enabled: $is-testing
      path: /tests/{action}
      method: POST
      task_processor: main-task-processor
    handler-ping:
      path: /ping
      method: GET
      task_processor: main-task-processor
      throttling_enabled: false
      url_trailing_slash: strict-match

    dns-client:
      fs-task-processor: fs-task-processor
